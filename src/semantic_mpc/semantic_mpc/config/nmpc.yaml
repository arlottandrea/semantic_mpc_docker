initial_randomic: true
run_dir: "/runs/nmpc_runs"

hidden_size: 64
hidden_layers: 3
nn_input_dim: 3
nn_output_dim: 2
# The surrogate confidence gate must match the RL observation range.
nn_threshold: 5.0
nn_gate_slope: 10.0
model_device: "cuda"
model_labels: ["ripe", "raw"]

mpc_horizon: 5
state_dim: 3
control_dim: 3
optimizer_state_dim: 6
# Match the RL policy observation cardinality (k_obs=5). Padded target slots
# are explicitly masked and do not duplicate objective weight.
num_target_trees: 5
num_obstacle_trees: 5
sim_steps: 1200
belief_update_period: 1
initial_pose_margin: 1.5
initial_pose_sleep: 1.5
wait_sleep: 0.05
loop_extra_sleep: 0.0

field_margin: 3.0
max_heading_abs: 9.42477796077
# Interpretable counterparts of the RL reward. Information gain and approach
# are benefits (subtracted by the optimizer); motion and acceleration are costs.
movement_weight: 0.01
yaw_movement_weight: 0.01
acceleration_regularization_weight: 0.0001
information_gain_weight: 1.0
information_discount: 0.99
attraction_weight: 0.1
ipopt:
  tol: 1.0e-6
  warm_start_init_point: "yes"
  print_level: 0
  sb: "no"
  warm_start_bound_push: 1.0e-8
  warm_start_mult_bound_push: 1.0e-8
  mu_init: 1.0e-5
  bound_relax_factor: 1.0e-9
  hessian_approximation: "limited-memory"
  mu_strategy: "monotone"
  max_iter: 1000

map_frame: "map"
base_frame: "drone_base_link"
tree_scores_topic: "tree_scores"
cmd_pose_topic: "cmd/pose"
predicted_path_topic: "predicted_path"
tree_markers_topic: "tree_markers"
tree_service: "/obj_pose_srv"

wandb_project: "semantic_mpc"
wandb_entity: ""
