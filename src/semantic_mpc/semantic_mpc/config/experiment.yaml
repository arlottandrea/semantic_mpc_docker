# Shared paired-trial configuration for baseline, active-RL, and NMPC evaluation.
# Trial i always uses trial_seed = seed + run_index_offset + i.
num_runs: 1
run_index_offset: 0
seed: 1

random_initial_state: true
start_pose: []
# These defaults coincide with the mower lane boundary and its configured
# north-facing sensor heading, so the reset pose is exactly mower path[0].
initial_corner_margin: 2.0
mower_heading: "N"
mower_heading_random: false
initial_pose_timeout: 15.0
initial_pose_tolerance: 0.15
initial_heading_tolerance: 0.2
initial_pose_publish_period: 0.1

# Shared evaluation constraints. Controllers may optimize differently, but
# they must obey the same physical and perception envelope.
dt: 0.25
measurement_period: 0.25
max_velocity: 1.75
max_yaw_velocity: 0.7853981633974483
max_lin_accel: 1.0
max_accel_xy: 1.0
max_yaw_accel: 1.5707963267948966
max_accel_yaw: 1.5707963267948966
obstacle_avoidance_distance: 1.5
safe_distance: 1.5
tree_velocity_radius: 5.0
tree_entropy_threshold: 0.025
tree_entropy_start_epsilon: 0.0001
# Binary confidence exactly equivalent to tree_entropy_threshold=0.025 bit.
belief_tracking_threshold: 0.9975245006578829
observation_range: 5.0
active_target_count: 5
active_obstacle_count: 5
max_experiment_steps: 1200

# Apply acceleration limits and obstacle avoidance to RL velocity commands.
# Disable to execute the bounded policy velocity directly.
rl_command_filter_enabled: true

# Local metrics are always written. Enable W&B explicitly when required.
wandb_enabled: false
wandb_mode: "online"
# High-rate control telemetry is kept in control_metrics.csv. W&B receives
# one aggregate for this many controller steps.
wandb_log_every_steps: 4
