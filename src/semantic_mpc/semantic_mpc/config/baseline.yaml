modes: ["mower"]
step_generator: "casadi_mpc"
run_root: "/runs/baseline_runs"

map_frame: "map"
base_frame: "drone_base_link"
tree_scores_topic: "tree_scores"
cmd_pose_topic: "cmd/pose"
cmd_pose_queue_size: 1
tree_scores_queue_size: 1
tree_service: "/obj_pose_srv"

tolerance: 0.2
waypoint_settle_time: 0.4
waypoint_hold_publish_period: 0.05
tree_observation_tolerance: 2.0
min_velocity: 0.2
cmd_smoothing_alpha: 0.2

obstacle_goal_ignore_distance: 2.0
obstacle_cone_angle: 1.0471975512
obstacle_tangent_gain: 3.25
obstacle_radial_gain: 1.75
obstacle_deviation_gain: 3.5

mpc_steps: 8
mpc_max_obstacles: 2
mpc_goal_weight: 8.0
mpc_heading_weight: 0.2
mpc_control_weight: 0.05
mpc_smooth_weight: 0.5
mpc_obstacle_weight: 0.25
mpc_velocity_weight: 2.0
mpc_ipopt_max_iter: 5

observation_entropy_threshold: 0.025
max_observe_time: 30.0
belief_tracking_threshold: 0.95
active_target_count: 5
# Symmetric nominal one-step sensor model used only to rank Greedy-IG targets.
greedy_ig_observation_accuracy: 0.9
mower_offset: 2.0
mower_spacing: 4.0
mower_axis: ""
linear_same_row_tol: 0.1

wandb_project: "semantic_mpc_baselines"
wandb_entity: ""
